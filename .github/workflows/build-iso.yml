name: Build ClarkOS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ISO_NAME: ClarkOS
  ISO_VERSION: "1.0.0"
  ARCH: amd64

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: debian:bookworm
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            live-build debootstrap \
            grub-efi-amd64-bin grub-pc-bin \
            syslinux isolinux \
            squashfs-tools xorriso \
            dosfstools sudo

      - name: Prepare live-build config
        run: |
          mkdir -p clarkos/live-build-config
          cd clarkos/live-build-config

          lb clean || true

          mkdir -p config/package-lists

          echo "systemd" > config/package-lists/clarkos.list.chroot
          echo "systemd-sysv" >> config/package-lists/clarkos.list.chroot
          echo "sudo" >> config/package-lists/clarkos.list.chroot
          echo "nano" >> config/package-lists/clarkos.list.chroot

      - name: Configure live-build
        run: |
          cd clarkos/live-build-config

          lb config \
            --architectures amd64 \
            --distribution bookworm \
            --bootloader "grub-efi syslinux" \
            --binary-images iso-hybrid \
            --iso-volume "ClarkOS" \
            --apt-indices false

      - name: Add autologin (optional)
        run: |
          mkdir -p clarkos/live-build-config/config/includes.chroot/etc/systemd/system/getty@tty1.service.d

          echo "[Service]" > clarkos/live-build-config/config/includes.chroot/etc/systemd/system/getty@tty1.service.d/override.conf
          echo "ExecStart=" >> clarkos/live-build-config/config/includes.chroot/etc/systemd/system/getty@tty1.service.d/override.conf
          echo "ExecStart=-/sbin/agetty --autologin root --noclear %I 38400 linux" >> clarkos/live-build-config/config/includes.chroot/etc/systemd/system/getty@tty1.service.d/override.conf

      - name: Build ISO
        run: |
          cd clarkos/live-build-config
          lb build

      - name: Rename ISO
        run: |
          cd clarkos/live-build-config

          if [ -f binary.hybrid.iso ]; then
            mv binary.hybrid.iso ClarkOS-${ISO_VERSION}-${ARCH}.iso
          else
            echo "ISO not found!"
            ls -la
            exit 1
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClarkOS-ISO
          path: clarkos/live-build-config/ClarkOS-*.iso
